@let currentTheme = colorTheme.theme();

<!-- TODO: Add tooltip for the icons -->

@if (currentTheme === colorThemes.Light) {
  <i
    class="tp-cursor-pointer bi bi-sun"
    (click)="colorTheme.setTheme(colorThemes.Dark)"></i>
} @else if (currentTheme === colorThemes.Dark) {
  <i
    class="tp-cursor-pointer bi bi-moon-stars"
    (click)="colorTheme.setTheme(colorThemes.Light)"></i>
}
