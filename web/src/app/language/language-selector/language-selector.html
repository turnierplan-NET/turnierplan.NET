@let currentLanguage = language.language();

<div
  class="user-select-none"
  tabindex="0"
  (click)="switchLanguage()"
  (keyup.space)="switchLanguage()"
>
  @switch (currentLanguage) {
    @case ('de') {
      <span class="tp-cursor-pointer">&#x1F1E9;&#x1F1EA;</span>
    }
    @case ('en') {
      <span class="tp-cursor-pointer">&#x1F1FA;&#x1F1F8;</span>
    }
    @default {
      <span class="tp-cursor-pointer">&#x2753;</span>
    }
  }
</div>
