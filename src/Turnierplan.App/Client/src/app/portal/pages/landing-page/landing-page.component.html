<ng-container *tpLoadingState="loadingState">
  <div class="mt-5 container">
    <tp-updates-check />

    <div class="d-flex flex-row flex-wrap align-items-center gap-2 mt-5">
      <span class="fs-4 fw-bold" [translate]="'Portal.LandingPage.Title'"></span>
      <div class="flex-grow-1"></div>
      <tp-action-button
        *tpIsAdministrator
        [title]="'Portal.Administration.Title'"
        [type]="'outline-primary'"
        [icon]="'gear'"
        [routerLink]="'administration'" />
      <tp-action-button
        *tpAllowCreateOrganization
        [tpE2E]="'landing-page-new-organization-button'"
        [title]="'Portal.LandingPage.NewOrganization'"
        [type]="'outline-success'"
        [icon]="'plus-circle'"
        [routerLink]="'create/organization'" />
    </div>

    <div class="mt-4">
      <div class="card">
        @if (organizations.length === 0) {
          <div class="card-body">
            <div class="py-5 d-flex flex-column align-items-center">
              <tp-illustration [name]="'select'" />
              <span translate="Portal.LandingPage.NoOrganizations" class="mt-5 text-center"></span>
              <span *tpAllowCreateOrganization translate="Portal.LandingPage.CreateNewOrganization" class="text-center"></span>
            </div>
          </div>
        } @else {
          <div class="card-header d-flex flex-row align-items-center">
            <tp-badge context="LandingPage" label="OrganizationCount" [value]="organizations.length" />
          </div>
          <div class="card-body d-flex flex-row flex-wrap gap-3">
            @for (organization of organizations; track organization) {
              <div class="card shadow-sm">
                <div class="card-body">
                  <div class="fs-5 fw-bold card-title">
                    <i class="bi bi-boxes"></i>
                    <span class="ms-2">{{ organization.name }}</span>
                  </div>
                  <div class="card-text small">ID: {{ organization.id }}</div>
                </div>
                <div class="card-footer text-end">
                  <a class="card-link" [routerLink]="'organization/' + organization.id">
                    <span translate="Portal.LandingPage.OrganizationTile.Open"></span>
                    <i class="ms-2 bi bi-arrow-right-circle" aria-hidden="true"></i>
                  </a>
                </div>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</ng-container>
